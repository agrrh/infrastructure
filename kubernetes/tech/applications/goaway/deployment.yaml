---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: goaway
  namespace: goaway
  labels:
    app: goaway

spec:
  replicas: 1
  selector:
    matchLabels:
      app: goaway
  template:
    metadata:
      labels:
        app: goaway
    spec:
      initContainers:
        - name: copy-default-config
          image: busybox:stable # или alpine:3.18
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/goaway.yaml ]; then
                echo "Config is absent, putting default in ..."
                cp /default/settings.yaml /config/settings.yaml
              else
                echo "Config exists, skipping."
              fi
          volumeMounts:
            - name: config-default
              mountPath: /default
            - name: config
              mountPath: /config
      containers:
        - name: goaway
          image: pommee/goaway:0.63.14
          imagePullPolicy: Always
          env:
            - name: DNS_PORT
              value: "53"
            - name: WEBSITE_PORT
              value: "8080"
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
                - NET_RAW
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: data
              mountPath: /app/data

      volumes:
        - name: config-default
          configMap:
            name: config-default
        - name: config
          persistentVolumeClaim:
            claimName: goaway-config
        - name: data
          persistentVolumeClaim:
            claimName: goaway-data
